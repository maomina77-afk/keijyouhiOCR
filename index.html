<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レシート集計リーダー (多機能版)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- localForage (内部ストレージ) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <!-- SheetJS (Excel読み書き) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- JSZip (ZIP圧縮用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .table-container { overflow-x: auto; }
        th, td { white-space: nowrap; }
        
        /* 長押しさせる要素のテキスト選択を無効化 */
        .long-pressable {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <header class="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">📊 レシート集計 (多機能版)</h1>
        <button id="nav-settings-btn" class="p-2 rounded hover:bg-blue-800 text-sm font-bold">⚙️ 設定/名簿</button>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <div id="error-msg" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4 rounded shadow-sm"></div>

        <!-- ⚙️ 設定・名簿インポート -->
        <section id="setup-area" class="hidden bg-white p-6 rounded-xl shadow-md mb-6">
            <h2 class="text-lg font-bold mb-2 text-blue-700 border-b pb-2">1. APIキー設定</h2>
            <input type="text" id="api-key-input" class="w-full border p-3 rounded mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <button id="save-key-btn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded shadow hover:bg-blue-700">APIキーを保存</button>
            
            <h2 class="text-lg font-bold mb-2 mt-8 text-blue-700 border-b pb-2">2. 名簿データのインポート</h2>
            <input type="file" id="roster-file-input" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" class="w-full border p-2 rounded mb-4">
            
            <div class="mt-8 border-t pt-4">
                <button id="cancel-settings-btn" class="hidden w-full bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded shadow hover:bg-gray-300 mb-4">メイン画面へ戻る</button>
                <button id="clear-roster-btn" class="w-full bg-red-50 text-red-600 font-bold py-2 rounded hover:bg-red-100 border border-red-200 text-sm">🗑️ 名簿と履歴をすべて初期化</button>
            </div>
        </section>

        <!-- 📱 メイン操作エリア -->
        <section id="main-area" class="hidden">
            <input type="file" id="image-input" accept="image/*" class="hidden">

            <!-- サマリー・統計表示 (長押しで集計表) -->
            <div id="stats-summary-box" class="long-pressable bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4 shadow-sm cursor-pointer relative active:bg-blue-100 transition-colors">
                <div class="flex justify-between items-center">
                    <div class="text-sm">
                        登録: <span id="stats-total" class="font-bold text-lg">0</span>人 / 
                        支払済: <span id="stats-paid" class="font-bold text-lg text-green-600">0</span>人
                    </div>
                    <div class="text-right">
                        <span class="text-xs text-gray-500 block">合計金額</span>
                        <span id="stats-amount" class="text-xl font-bold text-blue-700">0 円</span>
                    </div>
                </div>
                <div class="text-center text-[10px] text-blue-500 mt-1">👆長押しで組別集計表を表示👆</div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6" id="action-buttons">
                <button id="camera-btn" class="bg-indigo-500 text-white font-bold py-4 px-2 rounded-xl shadow hover:bg-indigo-600 flex flex-col items-center">
                    <span class="text-2xl mb-1">📷</span><span>カメラで撮影</span>
                </button>
                <button id="file-btn" class="bg-teal-500 text-white font-bold py-4 px-2 rounded-xl shadow hover:bg-teal-600 flex flex-col items-center">
                    <span class="text-2xl mb-1">🖼️</span><span>画像を選ぶ</span>
                </button>
            </div>

            <!-- 画像プレビュー -->
            <div id="preview-area" class="hidden bg-white p-4 rounded-xl shadow-md mb-6 text-center">
                <img id="preview-img" src="" alt="プレビュー" class="max-h-64 mx-auto rounded border border-gray-200 mb-4 object-contain">
                <div class="flex gap-2">
                    <button id="cancel-scan-btn" class="w-1/3 bg-gray-300 text-gray-700 font-bold py-3 rounded-lg shadow hover:bg-gray-400">戻る</button>
                    <button id="scan-btn" class="w-2/3 bg-green-500 text-white font-bold py-3 rounded-lg shadow hover:bg-green-600 text-lg">✨ OCR読み取り</button>
                </div>
            </div>

            <!-- 📝 抽出結果＆名簿照合エリア -->
            <div id="extraction-area" class="hidden bg-white p-5 rounded-xl shadow-md mb-6 border-2 border-indigo-400">
                <h3 class="font-bold text-lg text-indigo-700 mb-3 border-b pb-2">1. 読み取りテキスト (修正可)</h3>
                
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">番組</label>
                        <input type="text" id="ext-bangumi" class="w-full border p-2 rounded text-sm bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">組</label>
                        <input type="text" id="ext-kumi" class="w-full border p-2 rounded text-sm bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">No.</label>
                        <input type="text" id="ext-no" class="w-full border p-2 rounded text-sm bg-gray-50">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">お名前 (様の前)</label>
                        <input type="text" id="ext-name" class="w-full border p-2 rounded text-sm bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">金額 (円の前)</label>
                        <input type="number" id="ext-amount" class="w-full border p-2 rounded text-sm text-right bg-gray-50">
                    </div>
                </div>
                <details class="mb-4 text-xs text-gray-500">
                    <summary class="cursor-pointer hover:text-gray-700">生のOCRテキストを確認</summary>
                    <textarea id="raw-text" class="w-full h-24 mt-2 p-2 border rounded font-mono" readonly></textarea>
                </details>
                <hr class="my-4">
                <h3 class="font-bold text-lg text-green-700 mb-3 border-b pb-2">2. 名簿データと照合・確定</h3>
                <label class="block text-sm font-bold text-gray-700 mb-2">該当する人を選択してください</label>
                <select id="matched-person-select" class="w-full border border-green-400 p-3 rounded mb-4 bg-green-50 focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
                </select>
                <div class="flex gap-2">
                    <button id="cancel-save-btn" class="w-1/3 bg-gray-200 text-gray-700 font-bold py-3 rounded-lg shadow hover:bg-gray-300 text-sm">キャンセル</button>
                    <button id="save-list-btn" class="w-2/3 bg-indigo-600 text-white font-bold py-3 rounded-lg shadow hover:bg-indigo-700 text-lg">💾 支払済として記録</button>
                </div>
            </div>

            <!-- 📋 名簿一覧エリア -->
            <div id="summary-section">
                <div class="flex justify-between items-end mb-2 border-b pb-2">
                    <!-- タイトル長押しでコピーメニュー -->
                    <div id="roster-header-title" class="long-pressable cursor-pointer active:bg-gray-200 p-1 rounded transition-colors">
                        <h2 class="text-lg font-bold text-gray-700">📋 名簿一覧</h2>
                        <span class="text-xs text-blue-500">👆長押しでLINE用にコピー👆</span>
                    </div>
                    <button id="export-data-btn" class="bg-green-600 text-white text-xs font-bold py-2 px-3 rounded shadow hover:bg-green-700 flex flex-col items-center">
                        <span>📥 一括出力</span><span class="text-[9px] font-normal">(Excel + 写真ZIP)</span>
                    </button>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4">
                    <div class="table-container max-h-[500px] overflow-y-auto relative">
                        <table class="min-w-full text-sm text-left">
                            <thead class="bg-gray-100 border-b sticky top-0 z-10 shadow-sm">
                                <tr>
                                    <th class="p-2 cursor-pointer hover:bg-gray-200 text-blue-700 underline" onclick="toggleSort('id')">ID <span id="sort-icon-id"></span></th>
                                    <th class="p-2 cursor-pointer hover:bg-gray-200 text-blue-700 underline text-center" onclick="toggleSort('kumi')">組 <span id="sort-icon-kumi"></span></th>
                                    <th class="p-2">氏名</th>
                                    <th class="p-2 cursor-pointer hover:bg-gray-200 text-blue-700 underline text-center" onclick="toggleSort('status')">状況 <span id="sort-icon-status"></span></th>
                                    <th class="p-2 text-right">金額</th>
                                    <th class="p-2 text-center text-gray-500">操作</th>
                                </tr>
                            </thead>
                            <tbody id="roster-tbody" class="divide-y">
                                <!-- 名簿データ -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- 各種モーダルUI -->

        <!-- 1. 長押しコピーメニュー -->
        <div id="copy-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-lg w-full max-w-sm p-5 animate-scale">
                <h3 class="font-bold text-lg mb-4 border-b pb-2 text-gray-700">📋 リストをクリップボードにコピー</h3>
                <button onclick="copyToClipboard('all')" class="w-full bg-blue-50 text-blue-700 border border-blue-200 font-bold py-3 mb-3 rounded-lg hover:bg-blue-100">全員リストをコピー</button>
                <button onclick="copyToClipboard('paid')" class="w-full bg-green-50 text-green-700 border border-green-200 font-bold py-3 mb-3 rounded-lg hover:bg-green-100">【済】リストをコピー</button>
                <button onclick="copyToClipboard('unpaid')" class="w-full bg-red-50 text-red-700 border border-red-200 font-bold py-3 mb-5 rounded-lg hover:bg-red-100">【未】リストをコピー</button>
                <button onclick="closeModal('copy-modal')" class="w-full bg-gray-200 text-gray-700 font-bold py-3 rounded-lg">閉じる</button>
            </div>
        </div>

        <!-- 2. 組別集計表モーダル -->
        <div id="stats-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-5 max-h-[80vh] flex flex-col">
                <h3 class="font-bold text-lg mb-2 border-b pb-2 text-gray-700">📊 組別集計表</h3>
                <div class="overflow-y-auto flex-1 mb-4 border rounded">
                    <table class="min-w-full text-sm text-center">
                        <thead class="bg-gray-100 sticky top-0">
                            <tr><th class="p-2 border-b">組</th><th class="p-2 border-b">全体</th><th class="p-2 text-green-600 border-b">済</th><th class="p-2 text-red-600 border-b">未</th><th class="p-2 border-b text-right">金額(円)</th></tr>
                        </thead>
                        <tbody id="stats-tbody" class="divide-y"></tbody>
                    </table>
                </div>
                <button onclick="closeModal('stats-modal')" class="w-full bg-gray-200 text-gray-700 font-bold py-3 rounded-lg mt-auto">閉じる</button>
            </div>
        </div>

        <!-- 3. 手動編集モーダル -->
        <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-lg w-full max-w-sm p-5">
                <h3 class="font-bold text-lg mb-4 border-b pb-2 text-gray-700">📝 支払状況の手動編集</h3>
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label class="block text-xs font-bold text-gray-600 mb-1">氏名</label>
                    <input type="text" id="edit-name" class="w-full border border-gray-300 p-2 rounded bg-gray-100 text-gray-700 font-bold" readonly>
                </div>
                <div class="mb-3">
                    <label class="block text-xs font-bold text-gray-600 mb-1">支払状況</label>
                    <select id="edit-status" class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 font-bold">
                        <option value="">未</option>
                        <option value="済">済</option>
                    </select>
                </div>
                <div class="mb-5">
                    <label class="block text-xs font-bold text-gray-600 mb-1">金額(円)</label>
                    <input type="number" id="edit-amount" class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-blue-500 font-mono text-lg">
                </div>
                <div class="flex gap-2">
                    <button onclick="closeModal('edit-modal')" class="w-1/3 bg-gray-200 text-gray-700 font-bold py-3 rounded-lg">戻る</button>
                    <button onclick="saveEdit()" class="w-2/3 bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700">💾 変更を保存</button>
                </div>
            </div>
        </div>

        <!-- ローディング -->
        <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-white font-bold text-lg">処理中...</p>
        </div>
    </main>

    <script>
        // --- 状態管理 ---
        let apiKey = '';
        let currentImageBase64 = '';
        
        let roster = [];      // 名簿データ
        let historyLog = [];  // 変更履歴データ (Excelエクスポート用)
        let scanData = [];    // スキャン画像とOCRテキスト保存用 (ZIPエクスポート用)
        
        // ソート管理
        let sortKey = 'id';
        let sortDesc = false;

        // --- 初期化 ---
        document.addEventListener('DOMContentLoaded', async () => {
            localforage.config({ name: 'ReceiptApp', storeName: 'app_data' });
            
            apiKey = await localforage.getItem('visionApiKey');
            const savedRoster = await localforage.getItem('receiptRosterData');
            const savedLog = await localforage.getItem('receiptHistoryLog');
            const savedScan = await localforage.getItem('receiptScanData');
            
            if (savedRoster) roster = savedRoster;
            if (savedLog) historyLog = savedLog;
            if (savedScan) scanData = savedScan;

            if (apiKey) {
                document.getElementById('api-key-input').placeholder = '【＊＊＊＊＊＊】変更する場合のみ入力';
                document.getElementById('cancel-settings-btn').classList.remove('hidden');
            }
            
            if (!apiKey || roster.length === 0) {
                showSetupArea();
            } else {
                renderRosterTable();
                showMainArea();
            }

            // --- 長押しイベントの設定 ---
            setupLongPress(document.getElementById('stats-summary-box'), openStatsModal);
            setupLongPress(document.getElementById('roster-header-title'), () => {
                document.getElementById('copy-modal').classList.remove('hidden');
            });
        });

        // --- 長押し判定用ユーティリティ関数 ---
        function setupLongPress(element, callback) {
            let timer;
            const start = (e) => {
                timer = setTimeout(() => { timer = null; callback(e); }, 600); // 0.6秒で発動
            };
            const cancel = () => { if (timer) clearTimeout(timer); timer = null; };
            element.addEventListener('touchstart', start, { passive: true });
            element.addEventListener('touchend', cancel);
            element.addEventListener('touchmove', cancel);
            element.addEventListener('mousedown', start);
            element.addEventListener('mouseup', cancel);
            element.addEventListener('mousemove', cancel);
        }

        // --- 画面切り替え・UIヘルパー ---
        function showSetupArea() { document.getElementById('setup-area').classList.remove('hidden'); document.getElementById('main-area').classList.add('hidden'); }
        function showMainArea() { document.getElementById('setup-area').classList.add('hidden'); document.getElementById('main-area').classList.remove('hidden'); resetScanFlow(); }
        function resetScanFlow() {
            document.getElementById('action-buttons').classList.remove('hidden');
            document.getElementById('preview-area').classList.add('hidden');
            document.getElementById('extraction-area').classList.add('hidden');
            document.getElementById('summary-section').classList.remove('hidden');
            document.getElementById('image-input').value = '';
        }
        function showError(msg) {
            const err = document.getElementById('error-msg');
            err.textContent = msg; err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 5000);
            window.scrollTo(0, 0);
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showLoading(msg) {
            document.getElementById('loading-text').textContent = msg;
            document.getElementById('loading-overlay').classList.remove('hidden');
        }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

        // --- 設定・名簿インポート ---
        document.getElementById('nav-settings-btn').addEventListener('click', showSetupArea);
        document.getElementById('cancel-settings-btn').addEventListener('click', () => { if (roster.length > 0) showMainArea(); });
        document.getElementById('save-key-btn').addEventListener('click', async () => {
            const val = document.getElementById('api-key-input').value.trim();
            if (val) {
                await localforage.setItem('visionApiKey', val); apiKey = val;
                document.getElementById('api-key-input').placeholder = '【＊＊＊＊＊＊】変更する場合のみ入力';
                document.getElementById('api-key-input').value = '';
                alert("APIキーを保存しました。");
            }
            if (roster.length > 0) showMainArea();
        });

        document.getElementById('roster-file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoading("名簿を読み込み中...");
            const reader = new FileReader();
            reader.onload = async (evt) => {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    let json = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });

                    json = json.map((row, i) => {
                        if (!row["ID"]) row["ID"] = String(i + 1).padStart(3, '0');
                        if (!row["支払状況"]) row["支払状況"] = "";
                        if (!row["金額"]) row["金額"] = "";
                        if (!row["支払日時"]) row["支払日時"] = "";
                        return row;
                    });
                    roster = json;
                    await localforage.setItem('receiptRosterData', roster);
                    alert(`${roster.length}件の名簿を読み込みました！`);
                    renderRosterTable();
                    if (apiKey) showMainArea();
                } catch (err) {
                    showError("読み込み失敗。ファイル形式を確認してください。");
                } finally { hideLoading(); e.target.value = ""; }
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('clear-roster-btn').addEventListener('click', async () => {
            if (confirm("名簿とすべての支払履歴、保存された写真を消去しますか？\n（この操作は元に戻せません）")) {
                roster = []; historyLog = []; scanData = [];
                await localforage.setItem('receiptRosterData', roster);
                await localforage.setItem('receiptHistoryLog', historyLog);
                await localforage.setItem('receiptScanData', scanData);
                renderRosterTable();
                alert("データを初期化しました。");
            }
        });

        // --- 画像アップロード ---
        document.getElementById('camera-btn').addEventListener('click', () => {
            const input = document.getElementById('image-input');
            input.setAttribute('capture', 'environment'); input.click();
        });
        document.getElementById('file-btn').addEventListener('click', () => {
            const input = document.getElementById('image-input');
            input.removeAttribute('capture'); input.click();
        });

        document.getElementById('image-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoading('画像を準備中...');
            try {
                currentImageBase64 = await compressImage(file, 1200);
                document.getElementById('preview-img').src = currentImageBase64;
                document.getElementById('action-buttons').classList.add('hidden');
                document.getElementById('summary-section').classList.add('hidden');
                document.getElementById('preview-area').classList.remove('hidden');
            } catch (err) { showError("画像エラー"); resetScanFlow(); } finally { hideLoading(); }
        });
        document.getElementById('cancel-scan-btn').addEventListener('click', resetScanFlow);
        document.getElementById('cancel-save-btn').addEventListener('click', resetScanFlow);

        function compressImage(file, maxSize) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if (w > h && w > maxSize) { h *= maxSize / w; w = maxSize; }
                        else if (h > maxSize) { w *= maxSize / h; h = maxSize; }
                        const cvs = document.createElement('canvas');
                        cvs.width = w; cvs.height = h;
                        cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(cvs.toDataURL('image/jpeg', 0.8)); // 軽量化のため0.8
                    };
                    img.onerror = reject; img.src = e.target.result;
                };
                reader.onerror = reject; reader.readAsDataURL(file);
            });
        }

        // --- Google Vision API ---
        document.getElementById('scan-btn').addEventListener('click', async () => {
            if (!apiKey) { alert("APIキーを設定してください"); return showSetupArea(); }
            showLoading('OCR解析中...');
            try {
                const base64Data = currentImageBase64.split(',')[1];
                const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requests: [{ image: { content: base64Data }, features: [{ type: 'DOCUMENT_TEXT_DETECTION' }], imageContext: { languageHints: ['ja', 'en'] } }]
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || "通信エラー");
                const text = data.responses[0]?.fullTextAnnotation?.text || "";
                if (!text) throw new Error("文字が検出されませんでした");

                parseExtractedText(text);
                document.getElementById('preview-area').classList.add('hidden');
                document.getElementById('extraction-area').classList.remove('hidden');
            } catch (err) { showError("読み取りエラー: " + err.message); } finally { hideLoading(); }
        });

        function parseExtractedText(text) {
            document.getElementById('raw-text').value = text;
            const extBangumi = document.getElementById('ext-bangumi'); extBangumi.value = "";
            const extKumi = document.getElementById('ext-kumi'); extKumi.value = "";
            const extNo = document.getElementById('ext-no'); extNo.value = "";
            const extName = document.getElementById('ext-name'); extName.value = "";
            const extAmount = document.getElementById('ext-amount'); extAmount.value = "";

            const lines = text.split('\n');
            let maxAmount = 0; let match;
            while ((match = /([0-9,]+)[\s　]*円/g.exec(text)) !== null) {
                let val = parseInt(match[1].replace(/,/g, ''), 10);
                if (!isNaN(val) && val > maxAmount) maxAmount = val;
            }
            if (maxAmount > 0) extAmount.value = maxAmount;

            for (let line of lines) {
                let m = line.match(/(.*?)[\s　]+様/); if (m) { extName.value = m[1].trim(); break; }
            }
            if (!extName.value) {
                for (let line of lines) { let m = line.match(/([^\s]+)様/); if (m) { extName.value = m[1].trim(); break; } }
            }

            for (let line of lines.slice(0, 10)) {
                if (!extBangumi.value) { let m = line.match(/([0-9a-zA-Z一-龥]+)[\s　]*番組/); if (m) extBangumi.value = m[1]; }
                if (!extKumi.value) { let m = line.match(/([0-9a-zA-Z一-龥]+)[\s　]*組/); if (m) extKumi.value = m[1]; }
                if (!extNo.value) { let m = line.match(/No\.?[\s　]*([0-9a-zA-Z]+)/i); if (m) extNo.value = m[1]; }
            }
            searchAndSetCandidate();
        }

        function searchAndSetCandidate() {
            const kumi = document.getElementById('ext-kumi').value;
            const bangumi = document.getElementById('ext-bangumi').value;
            const no = document.getElementById('ext-no').value;
            const name = document.getElementById('ext-name').value;
            let targetPrefix = (kumi && bangumi && no) ? `${kumi}-${bangumi}-${no}` : "";
            const normalize = s => (s || "").replace(/[\s　]/g, '');
            const searchName = normalize(name);
            let matchedId = "";

            for (let r of roster) {
                const [prefix, ...nameParts] = (r["氏名"] || "").split(/[\s　]+/);
                const pName = normalize(nameParts.join(''));
                if (targetPrefix && searchName && prefix === targetPrefix && pName === searchName) { matchedId = r.ID; break; }
                if (targetPrefix && prefix === targetPrefix && !matchedId) { matchedId = r.ID; }
                if (searchName && pName && (pName.includes(searchName) || searchName.includes(pName)) && !matchedId) { matchedId = r.ID; }
            }

            const matchedSelect = document.getElementById('matched-person-select');
            matchedSelect.innerHTML = '<option value="NEW">-- 名簿外の新規データとして追加 --</option>';
            roster.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.ID;
                opt.textContent = `${r["氏名"]} (済:${r["支払状況"]==="済"?"済":"未"})`;
                matchedSelect.appendChild(opt);
            });
            if (matchedId) matchedSelect.value = matchedId;
        }

        // --- 支払確定処理 (OCR経由) ---
        document.getElementById('save-list-btn').addEventListener('click', async () => {
            const selectedId = document.getElementById('matched-person-select').value;
            const amount = parseInt(document.getElementById('ext-amount').value) || 0;
            const nowStr = new Date().toLocaleString('ja-JP');
            
            let targetPerson = null;
            let oldStatus = ""; let oldAmount = "";

            if (selectedId === "NEW") {
                const newId = "NEW-" + Date.now().toString().slice(-6);
                const extKumi = document.getElementById('ext-kumi').value;
                const newName = `${extKumi}-${document.getElementById('ext-bangumi').value}-${document.getElementById('ext-no').value} ${document.getElementById('ext-name').value}`.trim();
                targetPerson = { "ID": newId, "氏名": newName, "組": extKumi, "金額": amount, "支払状況": "済", "支払日時": nowStr, "ふりがな": "" };
                roster.push(targetPerson);
            } else {
                targetPerson = roster.find(r => String(r.ID) === String(selectedId));
                if (targetPerson) {
                    oldStatus = targetPerson["支払状況"]; oldAmount = targetPerson["金額"];
                    targetPerson["支払状況"] = "済";
                    targetPerson["金額"] = amount;
                    targetPerson["支払日時"] = nowStr;
                }
            }

            if (targetPerson) {
                // 変更履歴ログを追加
                historyLog.push({
                    "日時": nowStr, "操作": "OCRスキャン", "ID": targetPerson.ID, "氏名": targetPerson["氏名"],
                    "変更前状況": oldStatus, "変更後状況": "済", "変更前金額": oldAmount, "変更後金額": amount
                });
                
                // ZIP出力用に画像とテキストを保存
                scanData.push({
                    id: targetPerson.ID, name: targetPerson["氏名"], datetime: nowStr,
                    imageBase64: currentImageBase64, rawText: document.getElementById('raw-text').value
                });

                await localforage.setItem('receiptRosterData', roster);
                await localforage.setItem('receiptHistoryLog', historyLog);
                await localforage.setItem('receiptScanData', scanData);
                renderRosterTable();
            }
            resetScanFlow();
        });

        // --- 手動編集機能 ---
        window.openEditModal = function(id) {
            const person = roster.find(r => String(r.ID) === String(id));
            if(!person) return;
            document.getElementById('edit-id').value = person.ID;
            document.getElementById('edit-name').value = person["氏名"];
            document.getElementById('edit-status').value = person["支払状況"] === "済" ? "済" : "";
            document.getElementById('edit-amount').value = person["金額"] || "";
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveEdit = async function() {
            const id = document.getElementById('edit-id').value;
            const newStatus = document.getElementById('edit-status').value;
            const newAmount = parseInt(document.getElementById('edit-amount').value) || "";
            const nowStr = new Date().toLocaleString('ja-JP');
            
            const person = roster.find(r => String(r.ID) === String(id));
            if(person) {
                const oldStatus = person["支払状況"]; const oldAmount = person["金額"];
                person["支払状況"] = newStatus;
                person["金額"] = newStatus === "済" ? newAmount : ""; // 未の場合は金額を空に
                person["支払日時"] = nowStr;
                
                historyLog.push({
                    "日時": nowStr, "操作": "手動編集", "ID": person.ID, "氏名": person["氏名"],
                    "変更前状況": oldStatus, "変更後状況": person["支払状況"], "変更前金額": oldAmount, "変更後金額": person["金額"]
                });
                
                await localforage.setItem('receiptRosterData', roster);
                await localforage.setItem('receiptHistoryLog', historyLog);
                renderRosterTable();
            }
            closeModal('edit-modal');
        };


        // --- ソートと描画 ---
        window.toggleSort = function(key) {
            if (sortKey === key) { sortDesc = !sortDesc; }
            else { sortKey = key; sortDesc = false; }
            renderRosterTable();
        };

        function renderRosterTable() {
            // アイコン更新
            ['id', 'kumi', 'status'].forEach(k => {
                document.getElementById(`sort-icon-${k}`).textContent = (sortKey === k) ? (sortDesc ? '▼' : '▲') : '';
            });

            // データのソート
            let sortedData = [...roster];
            sortedData.sort((a, b) => {
                let valA = a[sortKey === 'status' ? '支払状況' : sortKey === 'kumi' ? '組' : 'ID'];
                let valB = b[sortKey === 'status' ? '支払状況' : sortKey === 'kumi' ? '組' : 'ID'];
                
                // 組やIDが数値の場合、数値としてソート
                if (sortKey === 'kumi' || sortKey === 'id') {
                    const numA = parseInt(valA); const numB = parseInt(valB);
                    if (!isNaN(numA) && !isNaN(numB)) { return sortDesc ? numB - numA : numA - numB; }
                }
                
                valA = String(valA || ""); valB = String(valB || "");
                return sortDesc ? valB.localeCompare(valA) : valA.localeCompare(valB);
            });

            const tbody = document.getElementById('roster-tbody');
            tbody.innerHTML = '';
            let paidCount = 0; let totalAmount = 0;
            
            sortedData.forEach(row => {
                const isPaid = row["支払状況"] === "済";
                if (isPaid) {
                    paidCount++; let amt = parseInt(row["金額"]);
                    if (!isNaN(amt)) totalAmount += amt;
                }
                
                const tr = document.createElement('tr');
                tr.className = isPaid ? "bg-green-50" : "hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="p-2 border-b text-xs text-gray-500">${escapeHtml(row["ID"])}</td>
                    <td class="p-2 border-b text-center font-bold">${escapeHtml(row["組"] || "-")}</td>
                    <td class="p-2 border-b font-bold truncate max-w-[150px]">${escapeHtml(row["氏名"])}</td>
                    <td class="p-2 border-b text-center">
                        ${isPaid ? '<span class="text-green-600 font-bold">済</span>' : '<span class="text-gray-400">未</span>'}
                    </td>
                    <td class="p-2 border-b text-right font-mono">${row["金額"] ? parseInt(row["金額"]).toLocaleString() : ''}</td>
                    <td class="p-2 border-b text-center">
                        <button onclick="openEditModal('${row.ID}')" class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold hover:bg-blue-200 shadow-sm">編集</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            document.getElementById('stats-total').textContent = roster.length;
            document.getElementById('stats-paid').textContent = paidCount;
            document.getElementById('stats-amount').textContent = totalAmount.toLocaleString() + ' 円';
        }

        // --- 組別集計表モーダル作成 (長押しで呼ばれる) ---
        window.openStatsModal = function() {
            const tbody = document.getElementById('stats-tbody');
            tbody.innerHTML = '';
            
            let summary = {};
            roster.forEach(r => {
                let kumi = r["組"] || "不明";
                if (!summary[kumi]) summary[kumi] = { total: 0, paid: 0, unpaid: 0, amount: 0 };
                summary[kumi].total++;
                if (r["支払状況"] === "済") {
                    summary[kumi].paid++;
                    let amt = parseInt(r["金額"]);
                    if (!isNaN(amt)) summary[kumi].amount += amt;
                } else { summary[kumi].unpaid++; }
            });

            // 組名でソートして表示
            Object.keys(summary).sort((a,b)=> {
                const numA = parseInt(a); const numB = parseInt(b);
                if(!isNaN(numA) && !isNaN(numB)) return numA - numB;
                return a.localeCompare(b);
            }).forEach(kumi => {
                const s = summary[kumi];
                tbody.innerHTML += `<tr>
                    <td class="p-2 font-bold border-b">${kumi}</td>
                    <td class="p-2 border-b">${s.total}</td>
                    <td class="p-2 text-green-600 font-bold border-b">${s.paid}</td>
                    <td class="p-2 text-red-600 font-bold border-b">${s.unpaid}</td>
                    <td class="p-2 text-right border-b">${s.amount.toLocaleString()}</td>
                </tr>`;
            });
            document.getElementById('stats-modal').classList.remove('hidden');
        };

        // --- LINE配信用クリップボードコピー ---
        window.copyToClipboard = async function(type) {
            let text = "";
            if (type === 'all') {
                text = "【全員リスト】\n";
                roster.forEach(r => {
                    const status = r["支払状況"] === "済" ? "済" : "未";
                    text += `${r.ID} ${r["氏名"]} ${r["組"]||"-"}組 ${status} ${r["金額"]?r["金額"]+"円":""}\n`;
                });
            } else if (type === 'paid') {
                text = "【支払済リスト】\n";
                roster.filter(r => r["支払状況"] === "済").forEach(r => {
                    text += `${r["氏名"]} (${r["金額"]}円)\n`;
                });
            } else if (type === 'unpaid') {
                text = "【未納者リスト】\n";
                roster.filter(r => r["支払状況"] !== "済").forEach(r => { text += `・${r["氏名"]}\n`; });
            }

            try {
                await navigator.clipboard.writeText(text);
                alert("コピーしました！\nLINEなどに貼り付けできます。");
                closeModal('copy-modal');
            } catch (err) {
                // 昔のブラウザ向けフォールバック
                const ta = document.createElement('textarea'); ta.value = text;
                document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
                alert("コピーしました！"); closeModal('copy-modal');
            }
        };

        // --- Excel + 写真 一括ZIP出力 ---
        document.getElementById('export-data-btn').addEventListener('click', async () => {
            if (roster.length === 0) return showError("出力するデータがありません。");
            
            showLoading("Excelと写真を圧縮中...\n(枚数が多いと数秒かかります)");
            
            try {
                // 1. Excelファイルの作成 (SheetJS)
                const wsRoster = XLSX.utils.json_to_sheet(roster);
                const wsHistory = XLSX.utils.json_to_sheet(historyLog.length ? historyLog : [{"情報":"まだ変更履歴がありません"}]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, wsRoster, "名簿データ");
                XLSX.utils.book_append_sheet(wb, wsHistory, "変更履歴ログ");
                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                
                const dateStr = new Date().toISOString().slice(0,10).replace(/-/g, "");

                // 2. ZIPファイルの構築 (JSZip)
                const zip = new JSZip();
                
                // エクセルをルート直下に配置
                zip.file(`レシート集計表_${dateStr}.xlsx`, excelBuffer);

                // 画像とテキストをフォルダに分ける
                const imgFolder = zip.folder("レシート写真");
                const txtFolder = zip.folder("OCRテキスト");

                scanData.forEach(data => {
                    // ファイル名に使えない文字をアンダースコアに置換
                    const safeName = (data.name || "不明").replace(/[\/\\:*?"<>|　 ]/g, "_");
                    const safeDate = (data.datetime || "").replace(/[\/:\s]/g, "");
                    const baseFilename = `${data.id}_${safeName}_${safeDate}`;
                    
                    if (data.imageBase64) {
                        const b64 = data.imageBase64.split(',')[1];
                        if(b64) imgFolder.file(`${baseFilename}.jpg`, b64, {base64: true});
                    }
                    if (data.rawText) {
                        txtFolder.file(`${baseFilename}.txt`, data.rawText);
                    }
                });

                // 3. ZIPを生成してダウンロード (DEFLATE圧縮設定で軽くする)
                const zipBlob = await zip.generateAsync({type:"blob", compression: "DEFLATE", compressionOptions: { level: 6 }});
                
                const a = document.createElement('a');
                a.href = URL.createObjectURL(zipBlob);
                a.download = `レシート集計一式_${dateStr}.zip`;
                a.click();
                URL.revokeObjectURL(a.href);
                
            } catch (err) {
                console.error(err);
                showError("エクスポート中にエラーが発生しました。");
            } finally {
                hideLoading();
            }
        });

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
